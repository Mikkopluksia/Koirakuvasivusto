<!DOCTYPE html>
<html>
<head>
    <title>Kuvapiilotus</title>
</head>
<body>

    <h1>Köpin kuva</h1>
    <img id="koirakuva" src="köbb" alt="koira">

    <br><br>

    
    <button onclick="kuvapiilotus()">Hide</button>

    <script>
        function kuvapiilotus() {
            let image = document.getElementById("koirakuva");
            let button = document.querySelector("button");

            if (image.style.display === "none") {
                image.style.display = "block";
                button.innerText = "Piilota";
            } else {
                image.style.display = "none";
                button.innerText = "Näytä";
            }
        }
    </script>

</body>
</html>
